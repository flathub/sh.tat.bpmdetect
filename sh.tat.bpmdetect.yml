id: sh.tat.bpmdetect
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: bpmdetect
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
cleanup:
  - /bin/soundstretch
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.a'
modules:
  - name: soundtouch
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://codeberg.org/soundtouch/soundtouch.git
        tag: 2.4.1
        commit: 0047e0b1ecfceb041348579119bf79b73a322a3a

  - name: bpmdetect
    builddir: true
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_DESKTOP_PORTAL=ON
      - -DFHS=ON
    sources:
      - type: git
        url: https://github.com/Tatsh/bpmdetect.git
        tag: v0.8.11
        commit: 34a9982b47deac033c6272e99eec5e00047223f5
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
